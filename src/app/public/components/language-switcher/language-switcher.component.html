<!-- Botón principal -->
<button type="button" class="lang-trigger" [matMenuTriggerFor]="menu" aria-label="Change language">
  <span class="material-icons lang-globe">language</span>
  <span class="lang-code">{{ currentLang | uppercase }}</span>
  <span class="material-icons lang-caret">expand_more</span>
</button>

<!-- Menú de opciones -->
<mat-menu #menu="matMenu" class="lang-menu">
  <button mat-menu-item *ngFor="let lang of languages" (click)="useLanguage(lang.label)"
          [class.selected]="lang.label === currentLang">
    <span class="lang-item">
      <span class="lang-item-code">{{ lang.label | uppercase }}</span>
      <span class="lang-item-name">{{ lang.label === 'en' ? 'English' : 'Español' }}</span>
      <span *ngIf="lang.label === currentLang" class="material-icons lang-check">check</span>
    </span>
  </button>
</mat-menu>
