<section aria-label="staff section">
  <div class="staff-list-header" *ngIf="showHeader || showAddButton">
    @if (showHeader) {
      <h3>{{ 'dashboard.ourStaff' | translate }}</h3>
    }
    @if (showAddButton) {
      <button
        mat-raised-button
        color="primary"
        type="button"
        aria-label="Add staff member"
        (click)="addStaffRequested.emit()">
        Add staff
      </button>
    }
  </div>
  @for (worker of WorkerList; track worker.name) {
    <div
      class="staff-list-item"
      [class.selectable]="selectable"
      [class.selected]="selectedWorkerId === worker.id"
      [attr.role]="selectable ? 'option' : null"
      [attr.aria-selected]="selectable ? selectedWorkerId === worker.id : null"
      (click)="selectWorker(worker)">
      <app-staff-item
        [worker]="worker"
        [selected]="selectedWorkerId === worker.id"
        [actionLabel]="selectable ? (selectedWorkerId === worker.id ? 'Selected' : 'Select') : null"
        [manageable]="manageable"
        (editRequested)="editWorkerRequested.emit($event)"
        (deleteRequested)="deleteWorkerRequested.emit($event)"
        aria-label="worker"></app-staff-item>
    </div>
  } @empty {
    <div class="u-empty">
      <span class="u-empty__icon"><span class="material-icons">group_add</span></span>
      <p class="u-empty__title">{{ 'dashboard.noStaffTitle' | translate }}</p>
      <p class="u-empty__text">{{ 'dashboard.noStaffText' | translate }}</p>
      @if (showAddButton) {
        <button
          class="u-btn-outline u-empty__action"
          type="button"
          aria-label="Add staff member"
          (click)="addStaffRequested.emit()">
          <span class="material-icons">add</span>
          Add staff
        </button>
      }
    </div>
  }
</section>
