<div class="review-card">
  <div class="review-card-head">
    <h4>{{ review.author }}</h4>
    <p class="stars">
      @for (star of [1, 2, 3, 4, 5]; track star) {
        <span class="material-icons" [class.filled]="star <= review.rating">star</span>
      }
    </p>
  </div>
  <p class="comment">{{ review.text }}</p>
</div>
