<section class="header">
  <!-- Cover -->
  <div class="cover-wrap">
    <ng-container *ngIf="profile.coverImageUrl; else coverFallback">
      <img class="cover" [src]="profile.coverImageUrl" alt="Salon cover">
    </ng-container>
    <ng-template #coverFallback>
      <div class="cover fallback-cover" aria-hidden="true"></div>
    </ng-template>

    <div class="cover-actions">
      <button type="button" class="cover-action" (click)="openEditImages()" aria-label="Edit profile images">
        <mat-icon>image</mat-icon>
      </button>
      <button type="button" class="cover-action" (click)="openEditSocials()" aria-label="Edit social links">
        <mat-icon>alternate_email</mat-icon>
      </button>
    </div>
  </div>

  <!-- Contenido en superficie clara (legible) -->
  <div class="header-body">
    <ng-container *ngIf="profile.profileImageUrl; else avatarFallback">
      <img class="avatar" [src]="profile.profileImageUrl" alt="Salon avatar">
    </ng-container>
    <ng-template #avatarFallback>
      <div class="avatar avatar-fallback" aria-hidden="true">{{ initials }}</div>
    </ng-template>

    <div class="text-info">
      <h2>{{ profile.companyName || 'Provider profile' }}</h2>

      <p class="location" *ngIf="displayLocation">
        <span class="material-icons">location_on</span>
        {{ displayLocation }}
      </p>

      <div class="socials" *ngIf="profile.socials && (profile.socials | keyvalue).length">
        <a
          *ngFor="let social of profile.socials | keyvalue"
          [href]="social.value"
          target="_blank"
          rel="noopener">
          <span class="material-icons">link</span>
          {{ social.key }}
        </a>
      </div>
    </div>
  </div>
</section>
