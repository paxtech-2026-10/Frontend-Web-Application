<section class="settings-card" aria-label="Settings container">
  <header>
    <h1>Settings</h1>
    <p>Review the public details attached to your provider profile.</p>
  </header>

  <div class="value-grid">
    <div class="value" aria-label="Salon name setting">
      <span class="label">Name</span>
      <span class="camp" aria-label="Salon name">{{ profile.companyName || 'Not configured' }}</span>
    </div>

    <div class="value" aria-label="Salon address setting">
      <span class="label">Address</span>
      <span class="camp" aria-label="Salon address">{{ profile.location || 'Not configured' }}</span>
    </div>

    <div class="value" aria-label="Provider email setting">
      <span class="label">Email</span>
      <span class="camp" aria-label="Provider email">{{ profile.email || 'Not configured' }}</span>
    </div>
  </div>
</section>
