<mat-card class="settings-card" appearance="outlined" aria-label="Password settings card">
  <mat-card-header>
    <mat-card-title>{{ 'settings.passwordTitle' | translate }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="notice">
      <mat-icon>lock</mat-icon>
      <div>
        <p class="notice-title">{{ 'settings.passwordNoticeTitle' | translate }}</p>
        <p class="notice-copy">
          {{ 'settings.passwordNoticeLinkedTo' | translate }}
          {{ profile.email || ('settings.passwordNoticeFallbackUser' | translate) }}.
          {{ 'settings.passwordNoticeSuffix' | translate }}
        </p>
      </div>
    </div>
  </mat-card-content>
</mat-card>
