<mat-card class="settings-card" appearance="outlined" aria-label="Password settings card">
  <mat-card-header>
    <mat-card-title>Password</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="notice">
      <mat-icon>lock</mat-icon>
      <div>
        <p class="notice-title">Password changes are not available here yet.</p>
        <p class="notice-copy">
          This account is linked to {{ profile.email || 'the provider user' }}.
          The backend does not currently expose a password update endpoint, so this form is disabled to avoid false saves.
        </p>
      </div>
    </div>
  </mat-card-content>
</mat-card>
