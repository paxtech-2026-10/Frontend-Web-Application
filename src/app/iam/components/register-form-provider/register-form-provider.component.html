<form class="register-form" [formGroup]="registerForm" (ngSubmit)="onRegister()">
  <div class="register-container">
    <div class="brand-head">
      <img src="/uTimee.png" alt="uTime" class="brand-logo">
      <span class="brand-name">uTime</span>
    </div>

    <h1 class="title">{{ 'register.title' | translate }}</h1>
    <p class="subtitle">
      {{ 'register.subtitle' | translate }}
      <a routerLink="/iam/login" class="login-link">{{ 'register.logIn' | translate }}</a>
    </p>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>{{ 'register.company' | translate }}</mat-label>
      <input matInput formControlName="companyName" type="text" aria-label="register provider company input" />
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>{{ 'register.email' | translate }}</mat-label>
      <input matInput formControlName="email" type="email" aria-label="register provider email input" />
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>{{ 'register.password' | translate }}</mat-label>
      <input matInput formControlName="password" type="password" aria-label="register provider password input" />
    </mat-form-field>

    <button class="u-btn-gradient register-button" type="submit" aria-label="register provider create button">
      {{ 'register.create' | translate }}
    </button>
  </div>
</form>
