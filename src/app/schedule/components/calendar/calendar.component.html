<div class="calendar-container" aria-label="Calendar container">

  <!-- Selector de trabajador -->
  <div class="worker-switcher" aria-label="Worker switcher">
    <button type="button" class="worker-nav" (click)="previousWorker()" [attr.aria-label]="'schedule.previousWorker' | translate">
      <span class="material-icons">chevron_left</span>
    </button>
    <div class="worker-current" aria-label="Current worker name">
      <span class="material-icons">{{ currentWorker === 'Todos' ? 'groups' : 'person' }}</span>
      {{ currentWorkerDisplay }}
    </div>
    <button type="button" class="worker-nav" (click)="nextWorker()" [attr.aria-label]="'schedule.nextWorker' | translate">
      <span class="material-icons">chevron_right</span>
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="calendar-state u-card" role="status" aria-live="polite">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
    <p>{{ 'schedule.loading' | translate }}</p>
  </div>

  <!-- Empty -->
  <div *ngIf="!isLoading && !hasAppointments" class="u-empty u-card">
    <span class="u-empty__icon"><span class="material-icons">event_busy</span></span>
    <p class="u-empty__title">{{ 'schedule.emptyTitle' | translate }}</p>
    <p class="u-empty__text">{{ 'schedule.emptyText' | translate }}</p>
  </div>

  <!-- Grid -->
  <div class="calendar-grid u-card" *ngIf="!isLoading && hasAppointments" aria-label="Calendar grid">
    <div class="calendar-scroll">
      <div class="calendar-days" aria-label="Calendar days header">
        <div class="time-label" aria-label="Time labels"></div>
        <div
          class="day-label"
          *ngFor="let day of days; let i = index"
          [class.today]="isTodayColumn(day)"
          aria-label="Day label">{{ translatedDayLabel(i) }}</div>
      </div>

      <div class="calendar-body" aria-label="Calendar body">
        <div class="hour-row" *ngFor="let hour of hours" aria-label="Hour row">
          <div class="time-label" aria-label="Hour label">{{ hour }}</div>
          <div
            class="day-cell"
            *ngFor="let day of days"
            [class.today]="isTodayColumn(day)"
            aria-label="Day cell">

            <ng-container *ngFor="let appointment of calendars">
              <app-reservation
                *ngIf="
                  isSameDay(appointment.timeSlot.startTime, day) &&
                  isWithinHour(appointment.timeSlot.startTime, hour) &&
                  (currentWorker === 'Todos' || appointment.workerId.name === currentWorker)
                "
                [service]="appointment.service.name"
                [startTime]="formatTime(appointment.timeSlot.startTime)"
                [endTime]="formatTime(appointment.timeSlot.endTime)"
                [clientName]="getClientName(appointment.clientId)"
                [isPaid]="!!appointment.paymentId.status"
                (cardClick)="openDetail(appointment)"
              ></app-reservation>
            </ng-container>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
