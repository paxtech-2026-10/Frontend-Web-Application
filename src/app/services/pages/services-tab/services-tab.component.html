<header class="page-header">
  <div>
    <h1 class="u-page-title" aria-label="Services">{{ 'dashboard.services' | translate }}</h1>
  </div>
  <button *ngIf="status === 'success'" class="u-btn-gradient" (click)="openCreateServiceDialog()" aria-label="Add new service">
    <span class="material-icons">add</span>
    {{ 'services.newService' | translate }}
  </button>
</header>

<div class="services" aria-label="Services section">

  <!-- Loading state -->
  <div *ngIf="status === 'loading'" class="state-container" role="status" aria-live="polite">
    <mat-progress-spinner mode="indeterminate" diameter="48"></mat-progress-spinner>
    <p class="state-text">{{ 'services.loading' | translate }}</p>
  </div>

  <!-- Empty state -->
  <div *ngIf="status === 'empty'" class="state-container u-card" aria-label="No services yet">
    <span class="u-icon-box state-emblem"><mat-icon>content_cut</mat-icon></span>
    <h2 class="state-title">{{ 'services.emptyTitle' | translate }}</h2>
    <p class="state-text">{{ 'services.emptySubtitle' | translate }}</p>
    <button class="u-btn-gradient" (click)="openCreateServiceDialog()" aria-label="Create first service">
      {{ 'services.firstService' | translate }}
    </button>
  </div>

  <!-- Failure state -->
  <div *ngIf="status === 'failure'" class="state-container u-card" role="alert">
    <mat-icon class="state-icon error-icon">error_outline</mat-icon>
    <h2 class="state-title">{{ 'services.failureTitle' | translate }}</h2>
    <p class="state-text" *ngIf="errorMessage">{{ errorMessage }}</p>
    <button class="u-btn-outline" (click)="retry()" aria-label="Retry loading services">
      {{ 'services.retry' | translate }}
    </button>
  </div>

  <!-- Success state -->
  <ng-container *ngIf="status === 'success'">
    <div class="u-card table-card">
      <app-service-table
        [services]="service"
        [newService]="newService"
        (servicesChanged)="loadServices()"></app-service-table>
    </div>
  </ng-container>

</div>
